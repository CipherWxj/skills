# PRD 结构完整性规则
# 维度: D_STRUCTURE
# 用途: 帮助 Agent 判断 PRD 是否具备进入评审和测试设计所需的最小结构骨架

meta:
  dimension: structure
  max_score: 40
  review_goal: 判断 PRD 是否把背景、目标、范围、方案和影响等关键信息交代完整
  scoring_hint:
    high: 5
    medium: 3
    low: 1

asset_contract:
  role: 结构完整性评估的规则事实来源
  owns: 规则适用条件、状态判定、严重度边界、证据要求、过滤/降级策略、问题颗粒度和输出措辞约束
  does_not_own: PRD 获取与展开、阶段执行顺序、JSON 输出包装、最终去重计分和报告排版
  used_by: [references/prompts/01-structure-review.md, references/prompts/03-score-report.md]
  conflict_policy: 与 prompt 对同一判断点不一致时，以本 YAML 的 review_principles、granularity_guidance、output_guidance、rules、additional_checks 为准

review_principles:
  - 先通读当前 PRD 正文，建立目标、范围、方案和影响视图；不要按关键词机械命中规则
  - 当前正文是第一事实来源；补充材料和特殊内容按 additional_checks 处理
  - 先判断规则是否适用，再输出 clear、partial、missing 或 not_applicable
  - 结构评估只判断关键章节或信息入口是否存在且可用，内容细节留给内容质量阶段
  - 只输出会影响评审准入、研发理解或测试设计的结构缺口
  - 同一根因只保留最能代表结构缺口的 finding；颗粒度和严重度按 granularity_guidance 与各规则的 severity_guidance 判断

granularity_guidance:
  purpose: 控制 finding 颗粒度，避免抽象模板项或内容细节过度拆分
  finding_shape:
    - 指明缺失或不足的结构入口
    - 体现该入口缺口对评审、研发或测试动作的影响
    - 不把多个结构入口揉成一个抽象问题
  split_when:
    - 缺口属于不同结构入口
    - 缺口影响不同协作方或不同测试设计动作
    - 同一章节承载多个独立准入信息，且待确认问题不同
  merge_when:
    - 多条规则指向同一空章节、模板占位或同一缺失入口
    - 多处证据只产生同一个待确认问题
    - 结构与内容边界相近时，结构阶段只保留入口缺失问题
  severity_guidance:
    use_rule_guidance_first: 优先使用命中规则自身的 severity_guidance
    fallback: 若单条规则未覆盖边界，按对评审准入、研发理解和测试设计的阻断程度判定
output_guidance:
  description:
    - 使用“结构入口 + 缺失/不足”
    - 不把字段取值、异常流程、实现细节写进结构问题标题
  evidence:
    - 引用能定位结构入口缺口的当前正文 1-2 句
    - 不引用章节标题、模板提示语、`<cite>`、`<img>`、HTML/Markdown 标签、其他展开占位或无证据推测
  reasoning:
    - 说明影响哪个评审、研发或测试动作
    - 提出需要补齐的信息类型，不替 PRD 作者补方案

rules:
  - id: structure-001
    name: 背景 / 收益 / 方向交代完整
    check: 判断 PRD 是否说明“为什么做、解决什么、做到什么程度”；轻量体验类需求不强制要求量化指标
    trigger_when: 任何正式 PRD 都应检查
    assessment_points:
      - 需求背景
      - 现状问题
      - 价值收益
      - 成功方向或基本完成判断
    judge_as:
      missing: 缺少背景、收益和成功方向的有效内容
      partial: 有背景或收益，但缺少现状问题、收益或成功方向
      clear: 背景、收益和成功方向基本齐全；轻量需求有方向性描述即可
    severity_guidance:
      high: 无法判断需求背景或收益方向
      medium: 可理解要做什么，但需求必要性或成功方向仍需追问
      low: 背景和方向基本清楚，仅缺少少量背景补充
    signals:
      semantic_titles: [背景, 收益, 现状, 问题, 痛点, 业务价值]
      useful_signals: [为什么做, 要解决什么, 当前问题, 用户收益, 业务收益, 成功方向, 预期效果]
    evidence_guidance:
      - 引用最能说明背景、现状、收益或成功方向的 1-2 句正文
      - 不引用章节标题或模板提示语

  - id: structure-002
    name: 需求详情 / 功能拆分清晰
    check: 判断 PRD 是否把本期功能拆到可评审、可估算、可测试的模块或规则入口
    trigger_when: 任何功能类 PRD 都应检查
    assessment_points:
      - 核心改动对象
      - 本期做 / 不做 / 沿用边界
      - 功能点对应的模块、规则或流程入口
      - 结构级变化对象和方向
    judge_as:
      missing: 缺少可落到功能点或模块粒度的方案描述
      partial: 有功能目标，但拆分、边界或结构级变化不清
      clear: 功能点、边界和主体方案基本清晰
    severity_guidance:
      high: 无法拆解功能点，研发无法估算或实现
      medium: 功能点存在，但边界或模块拆分仍影响测试范围
      low: 主体功能清楚，仅章节组织或命名略弱
    signals:
      semantic_titles: [需求详情, 功能列表, 功能拆分, 需求说明, 功能点, 方案说明]
      useful_signals: [新增, 修改, 调整, 页面, 模块, 功能点, 状态]
    evidence_guidance:
      - 引用能体现功能拆分、边界或方案入口的正文
      - 缺字段、按钮、触发、展示规则等落地细节时，转交 structure-003

  - id: structure-003
    name: 交互设计 / 原型 / 字段明细可支撑实现
    check: 判断涉及 UI、表单、配置、字段或接口参数的需求是否有可实现入口
    trigger_when: 涉及 UI、表单、配置、字段或接口参数时检查
    assessment_points:
      - 页面、组件、流程图、设计稿或截图入口
      - 触发点、跳转路径或配置入口
      - 关键字段、文案、状态、按钮、标签或表单项
      - 图文关系是否能由正文解释
    judge_as:
      not_applicable: 全文不涉及 UI、表单、配置、字段、接口参数或数据录入类上下文
      missing: 缺少原型、交互说明、字段定义等实现入口
      partial: 有页面或截图，但字段、交互或图文关系不清
      clear: 页面、交互或关键字段表达基本清晰
    severity_guidance:
      high: 核心 UI、表单或字段缺少实现入口
      medium: 主体可理解，但仍需补充交互或字段规则
      low: 主体清楚，仅少量说明或命名不足
    signals:
      semantic_titles: [原型图, 交互说明, 字段明细, 原型, UI稿, 线稿, 表单字段]
      useful_signals: [按钮, 页面, 弹窗, 列表, 配置项, 字段名, 参数]
    evidence_guidance:
      - 引用页面、原型、字段或交互说明附近正文
      - 字段迁移、兼容、回填或默认值问题转交 structure-006

  - id: structure-004
    name: 影响范围 / 涉及系统说明充分
    check: 判断 PRD 是否说明变更会影响哪些端、模块、角色或回归链路
    trigger_when: 任何有系统或角色影响的 PRD 都应检查
    assessment_points:
      - 端和平台范围
      - 模块、页面、入口、链路或服务范围
      - 角色、人群或实验人群范围
      - 调用方、数据源、消费方或回归链路
      - 本期排除范围
    judge_as:
      missing: 缺少影响对象、系统、角色或模块边界
      partial: 有影响对象，但范围过粗，无法确定测试覆盖边界
      clear: 影响对象、系统边界、端侧或角色范围基本明确
    severity_guidance:
      high: 无法判断变更波及范围
      medium: 核心模块可见，但端、角色、回归或排除范围不清
      low: 主范围明确，仅少量辅助范围需补充
    signals:
      semantic_titles: [影响范围, 相关评估, 涉及系统, 涉及项目, 涉及模块, 波及范围]
      useful_signals: [客户端, 服务端, 后台, app, H5, 配置平台, 上下游]
    evidence_guidance:
      - 引用影响范围、相关评估或需求详情中的边界说明
      - 依赖责任、联调前置、兜底或回滚问题转交 structure-005
      - 实验命中范围或观察口径问题转交 structure-007

  - id: structure-005
    name: 风险与依赖被明确识别
    check: 判断 PRD 是否说明依赖对象、前置条件、风险来源和处理方式
    trigger_when: 存在上下游协作、依赖现有能力或高风险变更时检查
    assessment_points:
      - 依赖对象
      - 前置条件
      - 风险来源
      - 兜底、降级、回滚、监控或人工处理入口
    judge_as:
      not_applicable: 全文没有上下游协作、外部依赖、前置条件或高风险变更上下文
      missing: 缺少风险、依赖、约束或前置条件说明
      partial: 提到风险或依赖，但对象、影响或处理方式不清
      clear: 风险来源、依赖对象或关键约束基本明确
    severity_guidance:
      high: 关键依赖或风险缺失会阻断上线或联调
      medium: 存在依赖或风险，但对象、边界或前置条件不清
      low: 主要依赖已识别，仅少量责任、时间或兜底信息不足
    signals:
      semantic_titles: [风险, 依赖, 变更影响, 影响面, 前置条件, 外部约束]
      useful_signals: [依赖方, 协同, 风险点, 前提, 受限, 约束]
    evidence_guidance:
      - 引用协同、依赖、前置条件或风险相关正文
      - 仅端、页面、模块、角色或波及范围不清时，转交 structure-004

  - id: structure-006
    name: 历史数据 / 存量数据处理方案充分
    check: 判断涉及数据改造时，PRD 是否说明存量数据处理和验证入口
    trigger_when: PRD 明确涉及数据改造、字段变更、迁移、兼容、落库、表结构调整时检查
    assessment_points:
      - 数据改造触发点
      - 存量数据、用户、配置或旧版本记录范围
      - 回填、迁移、默认值、兼容读取、双写或清理策略
      - 迁移结果、兼容行为或历史展示的验证入口
    judge_as:
      not_applicable: 全文没有数据改造、迁移、兼容或落库类上下文
      missing: 涉及数据改造，但缺少存量处理说明
      partial: 有存量处理方向，但范围、策略或验证入口不清
      clear: 存量处理边界、兼容方式或迁移原则基本明确
    severity_guidance:
      high: 数据改造缺少存量处理方案
      medium: 存量处理方向存在，但范围、默认值、兼容或验证入口不清
      low: 存量策略基本清楚，仅少量边界不足
    signals:
      semantic_titles: [历史数据, 数据迁移, 数据兼容, 存量数据, 老数据]
      useful_signals: [落库, 表结构, 数据改造, 字段变更, 兼容, 回填, 迁移]
    evidence_guidance:
      - 先引用数据改造触发点，再说明存量处理入口是否缺失
      - 新增字段或页面字段定义不足时，转交 structure-003

  - id: structure-007
    name: AB 实验方案结构完整
    check: 判断涉及 AB、灰度或分流时，PRD 是否说明实验结构和验证口径
    trigger_when: PRD 正文主体、已确认评论或目标/方案描述明确承接 AB 实验、灰度、分流、实验组、对照组等本期实验诉求时检查；仅章节模板占位不触发本规则
    assessment_points:
      - 实验目标
      - 分流节点、比例、实验组、对照组或互斥关系
      - 人群、端、城市、版本、入口或过滤条件
      - 核心指标、观察周期、停止或全量条件
      - 实验平台、链接、开关或灰度配置入口
    judge_as:
      not_applicable: PRD 不涉及实验或灰度
      missing: 提及实验，但缺少分组、分流或验证口径
      partial: 有实验描述，但运行方式、命中范围或观察口径不清
      clear: 分流、分组、命中范围和核心口径基本明确
    severity_guidance:
      high: 实验无法启动或无法验证
      medium: 实验可运行，但命中范围或观察口径影响结果解释
      low: 主体结构清楚，仅链接、配置或辅助指标待补
    signals:
      semantic_titles: [AB实验, A/B, 分流, 实验分组, 实验组, 对照组]
      useful_signals: [灰度, 分桶, 命中逻辑, 流量比例, 指标观察]
    evidence_guidance:
      - 引用实验分组、灰度、命中逻辑或指标说明正文
      - 仅实验链接缺失但分组和指标完整时，不输出正式问题
      - 产品整体端、模块、角色范围不清时，转交 structure-004
    
additional_checks:
  comment_resolution:
    signal: "[!comment] 评论 N"
    default_action: 先看当前正文；评论引用原文只作历史定位
    resolved_when:
      - 当前正文已独立闭环
      - 回复给出明确结论且不冲突
      - 评论明确非本期、无需处理或已确认
    keep_as_finding_when:
      - 评论指向结构入口且无有效回复
      - 回复只有 @ 人、催促、追问、待补充等过程信息
      - 回复结论未同步到正文，读者无法仅凭正文判断
      - 回复与当前正文冲突或多条回复无最终裁决
    output:
      - evidence 优先引用当前正文
      - 仅在正文未同步最终结论或存在未裁决冲突时引用评论
      - 禁止仅凭评论引用原文落 finding

  template_placeholder_filter:
    signals: [人员分工空表, 评审记录空表, 附录TODO, 备注空列, 埋点占位, 基础信息空字段, 实验设计空表]
    default_action: 写入 non_blocking_notes，不进 findings，不扣分
    keep_as_finding_only_when:
      - 空表是唯一承载完成口径、影响范围、字段契约或核心交付说明的区域
      - PRD 明确本期要交付报表或数据看板，但指标、口径缺失
      - 正文主体明确本期承接 AB / 灰度 / 分流，且实验章节是唯一承载实验准入口径的区域
    output: 若保留为 finding，reasoning 必须说明空表承载的核心结构信息

  empty_content:
    signals: [待补充, 待定, TODO, todo, TBD, Tbd, tbd, 详见, 略, 空]
    not_clear_when:
      min_non_empty_lines: 2
      min_effective_chars: 20

  image_text_balance:
    signals: [原型图, UI稿, 线稿, 截图, image, img, <img, ![, 流程图]
    not_clear_when:
      min_explainer_chars: 20
      patterns: [只有图片, 只有见原型图]

  external_reference:
    signals: [设计稿, 原型, 飞书引用, 白板, 外部文档, 外链]
    clear_when:
      - 当前 PRD 正文已概括外链承载的核心结构信息
      - 外链只是补充材料
    partial_when:
      - 外链是核心范围、方案或完成口径的唯一入口，且正文缺少摘要
    default_action: 外链不可读、无权限或无法展开时，只写入 non_blocking_notes，不扣分
    output: 不因外链存在直接判 clear；正式 finding 必须基于当前正文缺口
