# PRD 结构完整性规则
# 维度: D_STRUCTURE
# 用途: 帮助 Agent 判断 PRD 是否具备进入评审和测试设计所需的最小结构骨架

meta:
  dimension: structure
  max_score: 40
  review_goal: 判断 PRD 是否把背景、目标、范围、方案和影响等关键信息交代完整
  scoring_hint:
    high: 8
    medium: 4
    low: 2
  output_hint:
    status_values: [clear, partial, missing, not_applicable]

asset_contract:
  role: 结构完整性评估的规则事实来源
  owns:
    - 结构规则清单、适用条件和状态判定标准
    - 每条规则的 assessment_points、severity_guidance、evidence_guidance
    - 结构问题颗粒度控制、模板占位过滤、外链处理等判断边界
  does_not_own:
    - PRD 内容获取、嵌入展开和产物落盘流程
    - 结构评估的执行顺序和 JSON 输出包装
    - 最终去重、扣分计算和报告排版
  used_by:
    - references/prompts/01-structure-review.md
    - references/prompts/03-score-report.md
  prompt_relationship: prompt 负责“按什么步骤执行”，本 YAML 负责“依据什么标准判断”；当二者表述冲突时，以本 YAML 的规则字段为准

review_principles:
  - 不做纯关键词匹配，允许语义等价章节命中；判断前先通读 PRD，建立目标、范围、方案和影响的整体结构视图
  - 先判断规则是否适用，再判断信息入口是 clear、partial、missing 还是 not_applicable
  - 结构评估只判断“关键章节或信息入口是否存在且可用”，不提前下钻具体字段、流程、异常、埋点口径；这些留给内容质量阶段
  - 章节存在但内容空洞、只有标题、只有图片、只有外链、只有引用占位，不能直接视为 clear，需要判断正文是否概括了核心信息
  - 判断标准以“是否足以支撑需求评审、研发理解和测试设计”为准，不以模板标题是否完整为准
  - 模板占位、人员分工、评审记录、附录 TODO、非核心空表默认不扣分；只有承载核心范围、方案、完成口径或字段契约时才进入 findings
  - 同一根因跨多个结构规则命中时，结构阶段优先保留最能代表缺口的主入口问题；最终重复扣分由综合评分阶段处理
  - 每个正式 finding 必须能输出 status、severity、evidence、reasoning，且 evidence 只能引用 PRD 原文，不引用规则文本或模板提示语
  - 严重度按对评审准入和测试设计的阻断程度判定，不按章节标题是否缺失机械判定

granularity_guidance:
  purpose: 控制结构问题颗粒度，避免报告只有抽象模板项，或把内容细节提前拆得过碎
  finding_should_answer:
    - 缺的是哪个结构入口，例如目标、范围、方案、实验、依赖
    - 这个入口缺失会让评审、研发或 QA 哪个动作做不了
    - PRD 作者需要补齐哪类结构信息，而不是要求补具体实现细节
  split_when:
    - 缺失信息属于不同评审入口，例如目标方向、影响范围和实验结构
    - 缺口分别影响不同协作方或不同测试设计动作
    - 一个章节同时承载实验、依赖、范围等多类准入信息，且各自缺口独立
  merge_when:
    - 多条规则都指向同一空章节或同一模板占位
    - 同一段原文同时导致范围不清和依赖不清，但根因都是缺少影响范围说明
    - 问题只是在不同章节重复出现，实质缺口相同
  severity_guidance:
    high: 缺失后无法进入研发评估或测试设计，例如无主体方案、无关键交互入口、实验完全不可执行
    medium: 主体可读但准入信息不足，例如范围过粗、依赖不清、目标方向过于笼统
    low: 不阻断主线，但会增加沟通成本，例如章节命名不清、局部说明偏弱、非核心入口不完整

rules:
  - id: structure-001
    name: 背景 / 目标 / 方向交代完整
    severity: high
    check: 需要说明需求来源、当前问题、目标价值，并能回答“为什么现在做、做到什么程度”；不要求所有需求都有完整数据指标
    trigger_when: 任何正式 PRD 都应检查
    assessment_points:
      - 需求来源或触发原因：为什么现在要做
      - 现状问题：当前用户、业务或系统遇到什么问题
      - 目标价值：本期希望改善什么用户体验、业务结果或效率
      - 成功方向：能看出本期希望达成的效果、体验变化或基本判断口径；简单样式、文案、体验补齐类需求不强制要求量化数据
    judge_as:
      missing: 全文没有能承载背景、目标或成功方向的有效内容
      partial: 有背景或目标，但缺少问题现状、动机、价值或基本成功方向，无法理解需求必要性或判断目标是否达成
      clear: 背景、目标和成功方向基本齐全，且能支撑阅读者理解需求动机；若需求本身较轻量，有方向性描述即可
    severity_guidance:
      high: 完全看不出为什么做或要达成什么，导致研发和 QA 无法判断需求优先级和目标方向
      medium: 能看出要做什么，但现状问题、收益方向或基本成功方向不足，评审时仍需追问需求必要性或目标判断
      low: 需求动机和成功方向基本清楚，仅缺少少量背景补充或非核心数据引用
    evidence_cues:
      semantic_titles: [背景, 目标, 价值, 现状, 问题, 痛点, 业务价值]
      useful_signals: [为什么做, 要解决什么, 当前问题, 用户收益, 业务收益, 成功方向, 预期效果]
    evidence_guidance:
      - 优先引用背景、现状、目标或预期效果中最能说明动机和成功方向的 1-2 句
      - 不要只引用章节标题或模板提示语作为正式证据
    exemptions:
      - 明确标注为“概要版 / 草稿 / 预检稿”且用户诉求仅为快速预检时，可降低标准但不能直接跳过
    consequence: 缺少该信息会导致研发和测试无法判断需求动机、目标方向和基本完成判断

  - id: structure-002
    name: 需求详情 / 功能拆分清晰
    severity: high
    check: 需要给出核心功能点、模块拆分、关键方案或流程说明，不能只有一句笼统描述
    trigger_when: 任何功能类 PRD 都应检查
    assessment_points:
      - 核心改动对象：新增、修改或下线了哪些功能、模块、页面或策略
      - 功能边界：本期做什么、不做什么、沿用什么
      - 主体方案：每个核心功能点至少能落到模块、规则或流程入口
      - 状态变化：若涉及状态、排序、展示、配置变化，需要能看出变化前后关系
    judge_as:
      missing: 没有看到可以落到功能点或模块粒度的方案描述
      partial: 提到了功能目标，但功能拆分、状态变化或关键规则不足，难以落地开发与测试
      clear: 功能点边界和主体方案基本清晰，可作为后续详细设计输入
    severity_guidance:
      high: 只有目标口号或背景，没有任何可拆解功能点，研发无法估算或实现
      medium: 有功能点，但边界或模块拆分粗，QA 无法稳定拆测试范围
      low: 主体功能清楚，仅章节组织或局部模块命名不够清晰
    evidence_cues:
      semantic_titles: [需求详情, 功能列表, 功能拆分, 需求说明, 功能点, 方案说明]
      useful_signals: [新增, 修改, 调整, 页面, 模块, 功能点, 状态]
    evidence_guidance:
      - 引用能体现功能拆分或方案入口的原文
      - 若问题是“只有一句目标”，引用目标句并说明缺少模块拆分
    exemptions:
      - 纯背景型或纯策略型文档且明确说明“方案另附”时，可降为 partial 而非 missing
    consequence: 缺少功能拆分会直接阻断开发评估和测试点拆解

  - id: structure-003
    name: 交互设计 / 原型 / 字段明细可支撑实现
    severity: high
    check: 若需求涉及页面、表单、配置、接口或数据录入，需要提供可定位的交互、页面或字段说明
    trigger_when: 涉及 UI、表单、配置、字段或接口参数时检查
    assessment_points:
      - 页面或原型入口：有可定位的页面、组件、流程图、设计稿或截图
      - 交互入口：用户触发点、点击区域、跳转路径或配置入口至少有结构说明
      - 信息承载：关键字段、文案、状态、按钮、标签或表单项有基本说明
      - 图文关系：图片或设计稿能被正文解释，不依赖读者自行猜测图中含义
    judge_as:
      missing: 没有原型、交互说明、字段定义等任何可支撑实现的信息
      partial: 有截图或原型，但文字说明不足；或有页面描述但字段/交互规则不明确
      clear: 页面、交互和关键字段至少有一种清晰表达，足以支撑实现与校验
    severity_guidance:
      high: UI、表单或字段是核心交付，但没有任何可实现入口
      medium: 有图或链接但文字说明不足，仍需要评审现场补充才能实现或测试
      low: 主体交互清楚，仅少量图片说明、字段命名或设计链接不完整
    evidence_cues:
      semantic_titles: [原型图, 交互说明, 字段明细, 原型, UI稿, 线稿, 表单字段]
      useful_signals: [按钮, 页面, 弹窗, 列表, 配置项, 字段名, 参数]
    evidence_guidance:
      - 若只有图片或外链，引用“见原型 / 设计稿链接 / 图片占位”附近原文
      - 若有页面说明但缺字段或交互入口，引用页面说明并指出缺少结构入口
      - 本规则只判断交互、页面、字段说明是否能支撑实现；若问题核心是字段变更后的历史数据迁移、兼容、回填或默认值，归入 structure-006
    exemptions:
      - 后台无界面且无参数变更的纯策略需求，可标记为 not_applicable
    consequence: 缺少交互或字段细节会导致实现偏差和严重漏测

  - id: structure-004
    name: 影响范围 / 涉及系统说明充分
    severity: high
    check: 需要明确涉及的系统、端、模块、角色或上下游，至少让阅读者知道变更会波及哪里
    trigger_when: 任何有系统或角色影响的 PRD 都应检查
    assessment_points:
      - 端和平台范围：iOS、Android、Web、H5、小程序、后台、服务端等是否明确
      - 模块和页面范围：变更发生在哪些页面、入口、链路、配置或服务
      - 角色和人群范围：影响哪些用户、运营、审核、商家、内部角色或实验人群
      - 上下游范围：涉及哪些调用方、数据源、依赖系统、消费方或回归链路
      - 排除范围：明确哪些端、页面、历史逻辑或存量能力本期不改
    judge_as:
      missing: 完全没有说明影响范围、涉及系统、涉及角色或模块边界
      partial: 提到会影响某些对象，但范围过粗，无法判断测试覆盖边界
      clear: 影响对象、系统边界、端侧范围或角色范围基本明确
    severity_guidance:
      high: 无法判断变更会波及哪里，测试范围和联调范围都不可确定
      medium: 能看出核心模块，但端、角色、上下游或排除范围过粗
      low: 主范围明确，仅少量非核心端或辅助模块需要补充
    evidence_cues:
      semantic_titles: [影响范围, 相关评估, 涉及系统, 涉及项目, 涉及模块, 波及范围]
      useful_signals: [客户端, 服务端, 后台, app, H5, 配置平台, 上下游]
    evidence_guidance:
      - 优先引用影响范围、相关评估或需求详情中说明模块边界的原文
      - 不要只因“相关评估表为空”直接扣分，必须说明它导致哪个范围无法判断
      - 本规则只判断“变更会影响哪里”；若问题核心是依赖对象、前置条件、联调、兜底或回滚，归入 structure-005
      - 本规则只保留产品整体端、模块、角色范围问题；若问题核心是实验分流、实验命中人群、实验端/城市/版本或观察口径，归入 structure-007
    exemptions:
      - 仅限单模块文案修改且上下文明显时，可按 partial 放宽
    consequence: 影响范围不清会直接造成漏测和依赖遗漏

  - id: structure-005
    name: 风险与依赖被明确识别
    severity: medium
    check: 需要交代重要风险、依赖方、前置条件、外部约束或潜在影响面
    trigger_when: 存在上下游协作、依赖现有能力或高风险变更时检查
    assessment_points:
      - 依赖对象：依赖的数据、系统、平台、运营、算法、审核、法务或外部团队
      - 前置条件：上线、配置、数据准备、权限开通、联调、灰度或开关条件
      - 风险来源：兼容、性能、稳定性、合规、体验、数据一致性或回滚风险
      - 处理方式：风险触发时的兜底、降级、回滚、监控或人工处理入口
    judge_as:
      missing: 未看到任何风险、依赖、约束或前置条件说明
      partial: 仅笼统提到有风险/依赖，但没有说明是什么、影响什么
      clear: 风险来源、依赖对象或关键约束有明确说明
    severity_guidance:
      high: 关键依赖或风险缺失会阻断上线、联调或造成明显线上不可控风险时，可上调为 high
      medium: 存在跨团队或上下游依赖，但对象、边界或前置条件不清
      low: 已识别主要依赖，仅缺少责任人、时间点或局部兜底说明
    evidence_cues:
      semantic_titles: [风险, 依赖, 变更影响, 影响面, 前置条件, 外部约束]
      useful_signals: [依赖方, 协同, 风险点, 前提, 受限, 约束]
    evidence_guidance:
      - 引用提到协同、依赖、前置条件或风险的原文
      - 若全文没有风险章节，但需求明显涉及跨团队协作，可引用协作描述作为证据
      - 本规则只判断“依赖和风险如何控制”；若问题仅是端、页面、模块、角色或上下游影响范围不清，归入 structure-004
    exemptions:
      - 极小范围独立需求可适度放宽，但若涉及跨团队仍不能跳过
    consequence: 风险与依赖缺失会导致排期误判和联调风险暴露过晚

  - id: structure-006
    name: 历史数据 / 存量数据处理方案充分
    severity: high
    check: 涉及数据结构变化、落库、迁移、兼容改造时，需要说明存量数据如何处理
    trigger_when: PRD 明确涉及数据改造、字段变更、迁移、兼容、落库、表结构调整时检查
    assessment_points:
      - 触发条件：是否明确出现表结构、字段、数据源、配置、历史记录、缓存或兼容改造
      - 存量范围：影响哪些历史数据、存量用户、历史配置或旧版本记录
      - 处理策略：回填、迁移、默认值、兼容读取、双写、清理或不处理的原因
      - 验证入口：迁移结果、兼容行为或历史数据展示是否有可检查入口
    judge_as:
      not_applicable: 全文没有数据改造、迁移、兼容或落库类上下文
      missing: 已涉及数据改造，但没有任何存量数据处理说明
      partial: 提到会处理历史数据，但缺少迁移策略、兼容口径或回溯规则
      clear: 存量数据处理边界、兼容方式或迁移原则清晰
    severity_guidance:
      high: 已明确改字段、落库、迁移或兼容，但完全没有存量处理方案
      medium: 有存量处理方向，但迁移范围、默认值、兼容方式或验证入口不清
      low: 存量策略基本清楚，仅缺少少量边界说明
    evidence_cues:
      semantic_titles: [历史数据, 数据迁移, 数据兼容, 存量数据, 老数据]
      useful_signals: [落库, 表结构, 数据改造, 字段变更, 兼容, 回填, 迁移]
    evidence_guidance:
      - 先引用触发数据改造的原文，再说明未看到存量处理入口
      - 不能仅因没有“历史数据”章节就判问题，必须先确认 PRD 涉及数据改造上下文
      - 本规则只在历史数据、存量用户、迁移、兼容、回填、默认值等问题存在时输出；若只是新增字段/页面字段定义不足，归入 structure-003
    exemptions:
      - 明确说明“不涉及历史数据 / 仅新增独立表且不回写旧链路”时，可记为 not_applicable
    consequence: 缺少存量数据方案会导致上线后数据不一致或历史行为异常

  - id: structure-007
    name: AB 实验方案结构完整
    severity: high
    check: 若涉及 AB 实验、灰度或分流，需要说明分流节点、实验组/对照组逻辑及观察口径
    trigger_when: PRD 出现 AB 实验、灰度、分流、实验组、对照组等上下文时检查
    assessment_points:
      - 实验目标：实验要验证什么方案差异或业务假设
      - 分流结构：分流节点、流量比例、实验组、对照组、互斥关系是否明确
      - 命中范围：人群、端、城市、版本、入口、过滤条件或灰度条件是否说明
      - 观察口径：核心指标、护栏指标、观察周期、停止或全量条件是否有结构入口
      - 配置入口：实验平台、实验链接、开关或灰度配置是否可追踪
    judge_as:
      not_applicable: PRD 不涉及实验或灰度
      missing: 已提及实验，但缺少分组逻辑、分流节点或实验口径
      partial: 有实验描述，但不足以判断实验如何运行或如何验证
      clear: 分流节点、分组逻辑、实验口径或核心指标基本完整
    severity_guidance:
      high: 已明确本期做实验，但分组、分流或验证口径缺失到无法开实验
      medium: 实验能开起来，但命中范围、观察指标或全量条件不足以解释结果
      low: 主体实验结构清楚，仅实验链接、配置人或局部护栏指标待补
    evidence_cues:
      semantic_titles: [AB实验, A/B, 分流, 实验分组, 实验组, 对照组]
      useful_signals: [灰度, 分桶, 命中逻辑, 流量比例, 指标观察]
    evidence_guidance:
      - 引用实验分组、灰度、命中逻辑或指标说明的原文
      - 若实验链接待补但分组和指标已完整，不要仅因链接为空输出正式问题
      - 本规则只判断实验结构；若问题只是产品整体影响端、模块、角色或非实验人群范围不清，归入 structure-004
      - 实验目标和观察口径只在涉及实验运行或结果解释时归入本规则；普通需求的目标方向归入 structure-001
    exemptions:
      - 仅提到“后续可能做实验”但本期方案不包含实验执行时，可标记为 not_applicable 或 low risk 备注
    consequence: 实验结构不清会导致方案无法验证，甚至影响结果解释
additional_checks:
  template_placeholder_filter:
    purpose: 避免把模板预留空表误判为 PRD 结构缺陷
    default_action: 不进入 findings，不扣分；必要时写入 non_blocking_notes
    examples:
      - 人员分工表中 PM / 设计 / 服务端 / 前端 / iOS / 安卓 / QA 为空
      - 评审记录、会议纪要、备注、附录 TODO 为空
      - 报表需求或埋点需求表格为空，但正文未将其定义为本期核心交付物
      - 需求基本信息中的 Meego 链接、计划上线版本、评审时间为空
      - 实验链接标注“实验开启后填写”，且实验分组、指标和命中逻辑已有其他说明
    keep_as_finding_only_when:
      - 空表是唯一承载完成口径、影响范围、字段契约或核心交付说明的区域
      - PRD 明确本期要交付报表、埋点或数据看板，但指标、事件、口径缺失
      - 空表缺失会直接导致测试无法判断上线准出或核心范围
    output_requirement:
      - 被过滤的模板占位写入 non_blocking_notes，说明“不参与扣分”的原因
      - 如果决定保留为空表问题，reasoning 必须说明该空表承载哪类核心结构信息

  empty_content:
    purpose: 章节存在但内容空洞时，不应误判为 clear
    indicators: [待补充, 待定, TODO, todo, TBD, Tbd, tbd, 详见, 略, 空]
    weak_signals:
      min_non_empty_lines: 2
      min_effective_chars: 20

  image_text_balance:
    purpose: 提到原型图、截图、流程图时，需要至少有基本文字说明
    image_signals: [原型图, UI稿, 线稿, 截图, image, img, <img, ![, 流程图]
    weak_signals:
      min_explainer_chars: 20
      bad_pattern_examples:
        - 只有图片，没有文字说明
        - 只有“见原型图”这类一句话说明

  external_reference:
    purpose: 处理设计稿、原型、飞书引用、白板、外部文档等外链内容
    clear_when:
      - 当前 PRD 正文已概括外链承载的核心结构信息
      - 外链只是补充材料，不是理解范围、方案或完成口径的唯一入口
    partial_when:
      - 当前 PRD 只给外链或白板占位，缺少必要文字摘要
      - 外链承载关键原型、流程、字段或完成口径，但读取失败或权限不可见
    output_requirement:
      - 不因外链存在就直接判 clear
      - 不因外链不可读就直接判 high；严重度取决于该外链是否承载核心结构信息
