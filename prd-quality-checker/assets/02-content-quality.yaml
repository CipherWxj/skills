# PRD 内容质量与可测性规则
# 维度: D_CONTENT_AND_TESTABILITY
# 用途: 帮助 Agent 从描述质量、逻辑闭环和测试落地角度评估 PRD

meta:
  dimension: content
  max_score: 60
  review_goal: 判断 PRD 是否描述清晰、闭环完整、可以直接支持开发理解与测试设计
  scoring_hint:
    high: 8
    medium: 4
    low: 1
  output_hint:
    required_fields: [rule_id, rule_name, severity, description, evidence, reasoning]

asset_contract:
  role: 内容质量与可测性评估的规则事实来源
  owns:
    - 内容质量规则清单、风险焦点和严重度边界
    - 每条规则的 assessment_points、typical_signals、judge_as、evidence_guidance
    - 内容问题颗粒度控制、模板占位过滤、可测性缺口归类
  does_not_own:
    - PRD 内容获取、结构评估、最终评分和报告排版
    - 内容评估的执行顺序和 JSON 输出包装
    - 历史知识库读取策略
  used_by:
    - references/prompts/02-content-review.md
    - references/prompts/03-score-report.md
  prompt_relationship: prompt 负责“按什么步骤执行”，本 YAML 负责“依据什么标准判断”；当二者表述冲突时，以本 YAML 的规则字段为准

review_principles:
  - 规则用于帮助发现风险，不是关键词命中器；同义表达、跨段落上下文、图文互证都应纳入判断
  - 同一问题若被多个规则命中，优先合并为一条更完整的问题后再给严重度
  - 严重度以“对开发理解和测试落地的影响”判定，而不是以措辞好坏判定
  - evidence 必须回到原文；没有证据的推测不能输出为正式问题
  - 模板占位空表默认不作为内容质量问题；只有确认其承载本期核心交付、完成口径或数据观测口径时，才输出 finding
  - 人员分工、评审记录、备注、附录 TODO、报表/埋点预留表为空时，先放入 non_blocking_notes；若要扣分，reasoning 必须说明它影响哪个具体测试设计动作
  - 内容问题必须落到具体可追问对象，例如字段、口径、顺序、兜底、实验、埋点、跳转、异常或可测口径
  - 不重复输出纯结构缺口；只有结构问题已经直接影响规则理解、实现决策或测试断言时，才在内容阶段继续保留
  - 每个正式 finding 都要说明“哪个测试输入、预期结果、边界条件或上线判断做不了”

granularity_guidance:
  purpose: 控制内容问题颗粒度，使 finding 能直接进入评审待确认问题
  finding_should_answer:
    - 缺的是哪个具体对象，例如指标口径、字段含义、跳转结果、命中条件、埋点参数
    - 这个缺口会导致哪类实现分歧、测试断言缺失或上线判断不可做
    - PRD 作者需要回答什么问题，而不是泛泛写“需补充说明”
  categories:
    metric:
      focus: 指标、目标值、统计周期、基线、观察周期、成功阈值
      examples: [目标值缺失, 指标口径不清, 全量阈值不明]
    data:
      focus: 字段来源、字段含义、枚举、优先级、取数顺序、冲突裁决、默认值
      examples: [字段来源缺失, 多数据并列未裁决, 空值兜底不明]
    interaction:
      focus: 触发动作、跳转结果、展示状态、失败提示、回退路径、不可用状态
      examples: [点击后结果不明, 不支持场景无降级, 异常提示缺失]
    experiment:
      focus: 分流节点、命中条件、人群过滤、特殊城市、观察指标、放量节奏、停止条件
      examples: [命中逻辑不明, 全量阈值缺失, 护栏指标缺失]
    tracking:
      focus: 埋点事件、业务参数、实验组、样式版本、标签顺位、跳转结果、归因字段
      examples: [归因参数不足, show/clk 参数不闭环, 实验组未带出]
    dependency:
      focus: 上下游对象、对接文档、负责人、联调边界、数据交付时间、失败兜底
      examples: [依赖方不明, 联调入口缺失, 外部数据失败兜底不明]
    ui_boundary:
      focus: 长文案、截断、折行、适配、拥挤、深浅色、空态、极端数据展示
      examples: [长文案截断规则缺失, 窄屏适配不明, 多标签拥挤无规则]
  split_when:
    - 同一段原文暴露多个独立决策点，例如展示口径、点击跳转、埋点归因分别不清
    - 缺口分别影响不同测试类型，例如功能断言、数据校验、实验结果解释、UI 适配
    - 一个泛问题可以被评审现场拆成多个具体追问点
  merge_when:
    - 多条规则命中同一个缺口，例如“指标口径不清”同时影响价值和实验验证
    - 多个表述只是同一对象的不同证据，例如多处都说明“参考线上”
    - 问题只会产生同一个待确认点，拆开会造成重复扣分
  severity_guidance:
    high: 会阻断实现或测试设计，或可能导致错误上线决策
    medium: 主链路可做，但明显增加理解偏差、漏测或实验解释风险
    low: 不影响主流程判断，但会降低表达清晰度、边界覆盖或评审效率

output_guidance:
  description:
    - 用“具体对象 + 具体缺口”表达，不写“描述不清 / 需完善”这类抽象标题
    - 可用“【P1】/【P2】”标识评审优先级，但不要替代 severity
  evidence:
    - 引用 PRD 原文 1-2 句，优先引用能定位具体缺口的短句
    - 不引用规则文本、模板提示语或无证据推测
  reasoning:
    - 说明该缺口导致哪个实现判断、测试断言、数据校验或上线决策做不了
    - 不写教程式建议，不替 PRD 作者改写方案


rules:
  - id: content-001
    name: 需求价值模糊或不可量化
    severity: high
    check: 当 PRD 声称业务收益、增长、实验验证或效率提升时，需要看到可观察的目标、指标、量化口径或最少可验证的收益判断方式；普通样式、文案、体验补齐类需求不强制要求完整量化指标
    assessment_points:
      - 目标对象：要提升或优化的对象是否明确
      - 指标定义：指标名称、统计口径、分母分子或数据来源是否明确
      - 基线与目标：当前基线、目标值、成功阈值或判断方式是否明确
      - 观察窗口：统计周期、观察周期、实验周期或上线后回看周期是否明确
    risk_focus: 避免高收益或实验型目标只停留在口号层，导致结果判断和上线决策都不明确
    typical_signals:
      trigger_context: [提升, 优化, 改进, 目标, 价值, 收益]
      weak_signals: [可能, 大概, 也许, 尽量, 争取]
      positive_signals: [指标, KPI, 百分比, 具体数值, 量化口径, 成功标准]
    judge_as:
      high: 提出了明确业务收益、增长或实验验证目标，但完全没有量化指标或判断口径，无法验证结果
      medium: 有目标方向，但量化方式或统计口径不清晰
      low: 有少量量化信息或基本成功方向，但仍存在局部模糊表述
    severity_guidance:
      high: 目标不可验证，实验或上线决策无法判断成败
      medium: 指标方向存在，但口径、阈值或观察周期不足以支撑准出
      low: 主指标可用，仅局部补充口径或表达不够精确
    evidence_guidance:
      - 优先引用目标描述原文
      - 普通目标、收益方向或体验补齐只按本规则判断；若目标缺口发生在 AB/灰度实验的分流、观察、放量或停止条件中，归入 content-008
    exemptions:
      - 探索型草案可适当降低严重度，但只要进入评审，仍应指出问题
      - 简单样式、文案、体验补齐类需求已有基本成功方向时，可不要求完整数据指标

  - id: content-002
    name: 描述悬而未决
    severity: high
    check: PRD 中不应保留“待定 / 待讨论 / 后续再说”一类会阻断实施和测试的问题
    risk_focus: 避免需求关键点尚未收敛却直接进入开发或测试评审
    assessment_points:
      - 未决对象：待定内容是否属于核心规则、核心流程、数据口径、实验方案或上线条件
      - 决策责任：是否说明谁决策、何时决策、评审前是否会补齐
      - 影响范围：待定内容是否影响研发实现、测试输入、预期结果或上线准出
      - 本期边界：未决内容是否明确不属于本期交付
    typical_signals:
      weak_signals: [待定, 待讨论, 后续讨论, 有异议, 不确定, 待确定, 待评估]
      positive_signals: [最终方案, 明确结论, 已确认]
    judge_as:
      high: 关键流程、关键规则或关键方案仍处于待定状态
      medium: 非核心细节待补充，但已经影响完整理解
      low: 只是局部备注未收敛，不影响主流程判断
    severity_guidance:
      high: 未决点会阻断实现或测试断言
      medium: 主流程可做，但未决点会造成明显分歧或漏测
      low: 未决内容属于局部表达或后续协作信息
    evidence_guidance:
      - 直接引用悬而未决的表述
      - 说明该表述影响的是哪个实现或测试环节
    exemptions:
      - 明确属于附录或后续规划、且本期不做时，可不计为正式问题

  - id: content-003
    name: 引用式描述过多，信息未自洽
    severity: medium
    check: 不能过度依赖“同上 / 参考 XX / 与线上一致”来代替完整描述；至少要让阅读者在当前文档内形成基本理解
    risk_focus: 避免读者跳文档、跳系统后仍无法复原需求上下文
    assessment_points:
      - 引用对象：引用的是历史文档、线上逻辑、原型、设计稿还是其他系统
      - 自洽程度：当前 PRD 是否已经摘要说明本期需要依赖的关键规则
      - 可访问性：引用内容是否有权限、链接、版本或可定位章节
      - 差异边界：参考线上时是否说明本期差异、复用范围和不复用范围
    typical_signals:
      weak_signals: [同上, 类似, 参考, 如XX一样, 和XX一致, 同线上, 保持现状, 与线上相同]
      positive_signals: [链接, http, 文档, 详见, 背景说明, 现状描述]
    judge_as:
      medium: 多处依赖引用式表达，当前文档本身不能独立承载需求理解
      low: 有少量引用，但主体信息仍自洽
    severity_guidance:
      high: 引用承载核心规则且不可访问，导致主流程无法实现或测试时可上调为 high
      medium: 当前文档不能独立复原关键上下文，评审需跳转补证据
      low: 引用只是补充材料，主体方案仍可理解
    evidence_guidance:
      - 引用相关原文，并说明“若不跳转外部文档，当前读者无法知道什么”
      - 本规则只判断“当前文档是否依赖外部引用才读得懂”；若问题核心是当前状态与目标状态差异不可判断，归入 content-004
    exemptions:
      - 已给出高质量历史文档链接，且当前上下文已经足够理解时，可不判定为问题

  - id: content-004
    name: 现状与目标状态断裂
    severity: medium
    check: 变更型需求既要说明目标，也要交代当前状态，否则无法判断改动幅度和兼容边界
    risk_focus: 避免只说“改成什么”，却不说“现在是什么”
    assessment_points:
      - 现状入口：当前线上行为、历史规则、旧字段、旧流程或旧样式是否可复原
      - 目标状态：本期改成什么是否明确
      - 差异范围：哪些保持不变、哪些变更、哪些下线或兼容
      - 回归边界：现状与目标差异是否足以支撑回归范围判断
    typical_signals:
      trigger_context: [保持现状, 与线上相同, 跟线上一样, 沿用现有, 同线上, 改造, 调整, 优化]
      positive_signals: [当前, 现有, 线上, 历史, 之前, 原有, 参见, 详见]
    judge_as:
      medium: 目标态描述存在，但现状缺失，导致差异边界不明
      low: 现状有提及，但粒度不足
    severity_guidance:
      high: 缺少现状会导致核心变更无法判断或兼容风险不可控时可上调为 high
      medium: 目标可读但差异边界和回归范围不清
      low: 现状基本可复原，仅少量局部差异需要补充
    evidence_guidance:
      - 优先引用“保持现状 / 同线上”类原文
      - 指出当前缺的不是目标，而是现状参照系
      - 本规则只判断“现状与目标差异是否可复原”；若问题核心是引用外部文档后当前文档不自洽，归入 content-003
    exemptions:
      - 全新模块且无历史状态时，可不计入此问题

  - id: content-005
    name: 核心交互或业务流程不闭环
    severity: high
    check: 只描述 happy path 不够，需要让读者知道触发、输入、处理、结果、异常或返回路径是否完整
    risk_focus: 避免流程缺口导致开发补脑、测试漏场景
    assessment_points:
      - 触发入口：用户、系统或运营如何触发流程
      - 输入条件：前置状态、权限、配置、数据条件或筛选条件是否明确
      - 处理过程：系统如何判断、排序、流转、跳转、展示或保存
      - 输出结果：成功态、失败态、空态、回退态和提示是否明确
      - 异常边界：超时、失败、不可用、无权限、无数据、并发或重复操作是否有处理口径
    typical_signals:
      trigger_context: [点击, 进入, 打开, 跳转, 触发, 操作, 按钮, 提交, 发起, 输入]
      positive_signals: [触发, 输入, 请求, 响应, 展示, 返回, 结果, 跳转, 失败, 异常, 提示]
    judge_as:
      high: 核心流程关键步骤缺失，无法形成完整行为链路
      medium: 主链路存在，但异常链路、失败处理或状态回退不清
      low: 个别局部步骤描述略粗，但不影响主体流程理解
    severity_guidance:
      high: 缺少触发、判断或结果之一，主链路测试无法闭环
      medium: 主链路可测，但失败、空态、回退或边界场景不清
      low: 仅局部动作描述偏粗，不影响核心断言
    evidence_guidance:
      - 引用流程相关原文
      - 说明当前缺的是哪一段链路，如“触发后如何返回”“失败后如何处理”
      - 本规则只判断流程行为、成功态、失败态、空态和回退路径；若问题核心是字段来源、字段含义、类型、枚举、优先级、默认值或空值兜底，归入 content-006
    exemptions:
      - 纯规则型、无显式交互的后台配置改动，可降级为业务流程闭环判断

  - id: content-006
    name: 业务字段 / 数据口径定义不足
    severity: high
    check: 涉及业务字段、数据来源、配置项、展示数据或保存诉求时，PRD 应明确业务字段含义、来源、取数口径、展示/保存诉求和业务约束；接口协议、幂等、数据库表结构设计等技术实现细节属于研发设计
    risk_focus: 避免业务字段口径缺失，导致研发按经验补含义、QA 无法形成一致断言
    assessment_points:
      - 业务字段来源：字段来自配置、算法、人工录入、外部系统还是既有业务数据
      - 业务字段定义：字段业务含义、展示文案、枚举含义、默认值、示例是否明确
      - 取数规则：优先级、排序、筛选、冲突裁决、空值兜底是否明确
      - 数据使用诉求：数据用于展示、配置判断、业务计算、埋点还是保存，业务侧是否有保留或回看诉求
      - 兼容诉求：旧业务数据、历史记录或既有展示是否需要兼容；具体接口协议、幂等和表结构由研发设计承接
    typical_signals:
      trigger_context: [字段, 参数, 数据, 配置, 取数, 保存, 展示, 价格, 金额, 标签, 状态]
      positive_signals: [字段名, 字段含义, 字段列表, 示例值, 枚举, 默认值, 取数规则, 展示规则]
    judge_as:
      high: 已涉及核心业务数据，但关键业务字段含义、来源或取数规则缺失，无法支撑实现和测试断言
      medium: 有字段概念，但业务含义、约束、枚举、默认值或边界不清
      low: 字段业务口径主体明确，仅局部示例、枚举说明或辅助字段不足
    severity_guidance:
      high: 关键业务字段来源、含义或取数规则缺失，研发和 QA 无法形成一致断言
      medium: 字段主体存在，但业务约束、边界、默认值或兼容诉求不足
      low: 仅缺少示例、局部枚举或辅助字段说明，不影响主链路判断
    evidence_guidance:
      - 引用涉及业务字段、取数、配置、展示或保存诉求的原文
      - 明确指出缺的是“业务含义 / 来源 / 枚举 / 默认值 / 取数规则 / 展示或保存诉求”中的哪一类
      - 本规则只判断 PRD 需要交代的业务数据口径；接口协议、请求/响应结构、字段对齐、幂等、数据库表结构、索引、缓存、落表方案等研发设计细节不作为 PRD 内容缺陷
      - 若问题核心是对接对象、责任边界、联调入口、交付时间或外部依赖失败兜底，归入 content-007
      - 若问题核心是流程成功/失败/空态/回退行为，而不是字段口径，归入 content-005
      - 内容阶段只判断字段或接口口径是否足以形成测试断言，若问题核心是存量迁移、历史数据兼容或回填方案入口缺失，归入 structure-006
    exemptions:
      - 纯 UI 微调且无参数变化时，可不适用
      - 仅缺少接口协议、幂等策略、数据库表结构、技术字段命名或字段对齐细节时，不输出本规则 finding；这些属于研发/技术方案职责

  - id: content-007
    name: 上下游对接信息不足
    severity: medium
    check: 既然提到了对接、依赖或协同，就应说明对接对象、负责人、文档或最少联调边界
    risk_focus: 避免 PRD 只说“需要对接某方”，但无法进入实施和测试协同
    assessment_points:
      - 对接对象：涉及哪些团队、系统、服务、数据源、运营或外部平台
      - 契约入口：接口文档、字段协议、配置文档、数据样例或联调环境是否可定位
      - 责任边界：谁提供数据、谁消费数据、谁配置、谁确认交付
      - 时间依赖：依赖交付时间、联调时间、灰度时间是否影响本期上线
      - 失败兜底：依赖不可用、数据延迟、接口失败时是否有处理口径
    typical_signals:
      trigger_context: [对接, 上下游, 依赖方, 调用方, 被调用, 协同, 合作方]
      positive_signals: [对接人, 对接文档, POC, 负责人, 联系人, 链接, wiki, doc]
    judge_as:
      medium: 明确存在对接关系，但对接入口或责任边界不清
      low: 对接对象明确，但支撑信息略少
    severity_guidance:
      high: 上下游契约缺失会阻断主链路实现或联调时可上调为 high
      medium: 对接关系明确但文档、责任边界或联调入口不足
      low: 主要对象清楚，仅缺少局部负责人或辅助材料
    evidence_guidance:
      - 引用对接相关原文
      - 说明缺少什么会影响联调或测试准备
      - 本规则只判断上下游对接、责任边界、联调入口、交付时间和外部依赖兜底；若问题核心是具体字段名、字段含义、接口参数或取数规则，归入 content-006
      - 已有依赖入口但契约、负责人、联调细节不足时，归入本规则；若只是缺少依赖、风险或前置条件的结构入口，归入 structure-005
    exemptions:
      - 若对接对象是本团队内固定能力且上下文充分，可降级处理

  - id: content-008
    name: AB 实验描述不清
    severity: high
    check: 当 PRD 涉及实验或灰度时，需要交代分流逻辑、实验组和对照组差异、核心观察指标
    risk_focus: 避免实验只能“开起来”，却无法解释结果和回收结论
    assessment_points:
      - 实验目标：实验验证哪个假设或方案差异
      - 分流逻辑：分流节点、比例、互斥、命中优先级和实验组差异是否明确
      - 命中范围：端、版本、人群、城市、入口、过滤条件、特殊处理是否明确
      - 指标体系：决策指标、观察指标、护栏指标、统计口径是否明确
      - 回收口径：观察周期、放量节奏、停止条件、全量阈值是否明确
    typical_signals:
      trigger_context: [AB实验, ab实验, A/B, 分流, 实验分组, 实验组, 对照组, 灰度]
      positive_signals: [分流比例, 分流节点, 分组逻辑, 实验组逻辑, 对照组逻辑, 指标]
    judge_as:
      high: 已说要实验，但缺少分桶或验证所需信息
      medium: 有分组信息，但指标或验证口径不足
      low: 主体方案明确，仅细节尚待补足
    severity_guidance:
      high: 缺少分流、命中或验证口径，实验无法正确上线或解释
      medium: 实验能运行，但指标、放量、特殊人群或全量阈值不足
      low: 主体实验方案清楚，仅实验链接或局部护栏指标待补
    evidence_guidance:
      - 引用实验或灰度相关原文
      - 说明缺的是“分组逻辑 / 分流节点 / 指标口径”中的哪一项
      - 本规则只判断 AB/灰度实验的分流、命中、指标、放量、停止和结果解释；普通目标、收益方向或非实验上线判断归入 content-001
      - 实验人群、端、城市、版本、入口等命中范围归入本规则；产品整体影响范围、回归范围和不改范围归入 content-009
      - 已有实验结构但分流、指标、放量或停止条件不清时，才归入本规则；若只是缺少实验结构入口，归入 structure-007
    exemptions:
      - 仅把实验作为未来备选方案、本期不执行时，可不记为正式问题

  - id: content-009
    name: 变更影响面描述不具体
    severity: medium
    check: 变更型需求应明确影响哪些功能、流程、系统、角色或数据链路，而不是只说“有影响”
    risk_focus: 避免上线前才发现回归范围被低估
    assessment_points:
      - 功能影响：哪些页面、模块、流程、入口、配置或历史能力受影响
      - 数据影响：哪些接口、字段、埋点、缓存、报表或下游消费受影响
      - 用户影响：哪些角色、人群、端、城市、版本或实验组受影响
      - 回归范围：已有能力、旧链路、边界场景和不改范围是否明确
    typical_signals:
      trigger_context: [变更, 修改, 调整, 改造, 升级, 重构]
      positive_signals: [影响范围, 影响面, 受影响, 波及, 回归范围, 兼容]
    judge_as:
      medium: 说明是变更需求，但影响面未覆盖主要回归对象
      low: 影响范围有提及，但仍偏粗
    severity_guidance:
      high: 影响面缺失会导致核心回归范围无法判断时可上调为 high
      medium: 主体变更清楚，但系统、角色、数据链路或回归边界不完整
      low: 主要影响范围明确，仅辅助模块或边界说明不足
    evidence_guidance:
      - 引用变更相关原文
      - 说明缺少影响面会导致哪些测试范围无法判断
      - 本规则只判断内容层面的影响面是否具体到可测试、可回归；若结构阶段仅缺少影响范围入口，归入 structure-004
      - 若问题核心是 AB/灰度实验命中范围，归入 content-008，不在本规则重复输出
    exemptions:
      - 极小范围单点修改且影响边界显而易见时，可降级

  - id: content-010
    name: 模糊副词和主观表述过多
    severity: low
    check: 模糊副词本身不是致命问题，但若频繁出现，会降低需求可执行性和可验证性
    risk_focus: 避免 PRD 用“合理 / 适当 / 较好”替代明确规则
    assessment_points:
      - 模糊对象：模糊词修饰的是核心规则、阈值、时机、排序、范围还是非核心说明
      - 替代条件：是否已有数值、枚举、条件、判断标准或示例支撑
      - 影响程度：模糊表述是否会导致研发实现分歧或测试预期不一致
      - 出现密度：是否零散出现，还是在关键规则中反复出现
    typical_signals:
      weak_signals: [可能, 大概, 也许, 或许, 适当, 合理, 较佳, 较好, 相对]
      positive_signals: [阈值, 条件, 规则, 数值, 明确标准]
    judge_as:
      low: 局部存在模糊措辞，但已有替代条件或不影响主链路判断
      medium: 模糊表述大面积影响主体规则理解时，可上调严重度
    severity_guidance:
      high: 模糊表述直接影响核心流程或上线条件且无替代口径时可上调为 high
      medium: 多处模糊表述影响主要规则理解
      low: 局部表达不精确，但不影响主链路判断
    evidence_guidance:
      - 只选真正影响理解的模糊表述，不要机械穷举所有口语词
      - 本规则是兜底低优先级规则；若模糊表述已经能归入字段、流程、实验、影响面、对接等具体规则，应优先使用具体规则，不在本规则重复输出
    exemptions:
      - 背景描述中的自然语言表述，可适当放宽

agent_focus:
  template_placeholder_filter:
    default_action: 非阻断说明，不参与扣分
    examples:
      - 人员分工表为空
      - 报表需求表只有指标名称、指标描述、备注表头但内容为空
      - 埋点需求表、评审记录表、会议纪要、备注列、附录 TODO 为空
    keep_as_finding_only_when:
      - PRD 明确本期要上线报表、埋点或数据看板，且没有其他指标或事件说明
      - 空表导致无法设计数据校验、埋点校验、核心字段校验或上线准出
      - 空表是唯一说明接口字段、可测口径、影响范围的区域
  must_review:
    - 异常流程、失败分支、撤回、重试、超时、空值、并发
    - 状态流转是否闭环，是否能推导出可验证预期
    - 是否存在“只写目标，不写现状 / 只写结果，不写规则 / 只写页面，不写数据”
    - 是否每个核心功能点都能拆出测试条件、输入和预期结果
  merge_guidance:
    - 同一问题若同时命中“流程不闭环”和“可测口径不足”，优先保留更能解释测试风险的一条
    - 若多个问题本质都指向“信息不足”，优先按缺失对象拆分，如字段定义不足、影响范围不足、实验口径不足
