# PRD 内容质量与可测性规则
# 维度: D_CONTENT_AND_TESTABILITY
# 用途: 帮助 Agent 从描述质量、逻辑闭环和测试落地角度评估 PRD

meta:
  dimension: content
  max_score: 60
  review_goal: 判断 PRD 是否描述清晰、闭环完整、可以直接支持开发理解与测试设计
  scoring_hint:
    high: 6
    medium: 4
    low: 2

asset_contract:
  role: 内容质量与可测性评估的规则事实来源
  owns: 规则适用条件、风险焦点、严重度边界、证据要求、过滤/降级策略、跨规则必查项、可测性分类、问题颗粒度和输出措辞约束
  does_not_own: PRD 获取与展开、结构评估、历史知识读取、阶段执行顺序、JSON 输出包装、最终去重计分和报告排版
  used_by: [references/prompts/02-content-review.md, references/prompts/03-score-report.md]
  conflict_policy: 与 prompt 对同一判断点不一致时，以本 YAML 的 review_principles、granularity_guidance、output_guidance、cross_rule_checks、rules、additional_checks 为准

review_principles:
  - 先基于当前 PRD 正文和结构评估结果建立内容视图；不要按关键词机械命中规则
  - 当前正文是第一事实来源；补充材料和特殊内容按 additional_checks 处理
  - 内容评估只判断规则、流程、字段、口径、边界和可测性是否可落地，不重复输出纯结构缺口
  - 只输出会影响开发理解、测试断言、数据校验或上线判断的问题
  - 同一根因只保留最能解释测试风险的 finding；颗粒度和严重度按 granularity_guidance 与各规则的 severity_guidance 判断
  - 可测性结论基于测试输入、预期结果、边界条件、异常场景和上线判断能否形成

granularity_guidance:
  purpose: 控制 finding 颗粒度，使问题可直接进入评审待确认清单
  finding_shape:
    - 指明具体对象和缺口
    - 体现该缺口对测试落地或上线判断的影响
    - 不把多个缺口对象揉成一个抽象问题
  categories:
    metric: 指标、目标值、统计周期、基线、观察周期、成功阈值
    data: 字段来源、含义、枚举、优先级、取数顺序、冲突裁决、默认值
    interaction: 触发动作、跳转结果、展示状态、失败提示、回退路径、不可用状态
    experiment: 分流节点、命中条件、人群过滤、观察指标、放量节奏、停止条件
    dependency: 上下游对象、对接文档、负责人、联调边界、交付时间、失败兜底
    phase_boundary: 分期对象、本期范围、本期不做项、暂不支持表现、跨期依赖
    ui_boundary: 长文案、截断、折行、适配、拥挤、空态、极端数据展示
  split_when:
    - 缺口属于不同对象或不同可测口径
    - 缺口影响不同测试类型
    - 待确认问题不同
    - 多个问题同为信息不足时，按缺失对象拆分
  merge_when:
    - 多条规则指向同一对象缺口
    - 多处证据只产生同一个待确认问题
    - 结构与内容边界相近时，内容阶段只保留影响测试落地的缺口
    - 同一问题若同时命中“流程不闭环”和“可测口径不足”，优先保留更能解释测试风险的一条
  severity_guidance:
    use_rule_guidance_first: 优先使用命中规则自身的 severity_guidance
    fallback: 若单条规则未覆盖边界，按对实现、测试设计和上线判断的阻断程度判定
output_guidance:
  description:
    - 使用“具体对象 + 具体缺口”
    - 不写“描述不清 / 需完善”这类抽象标题
  evidence:
    - 引用能定位缺口的当前正文 1-2 句
    - 不引用规则文本、模板提示语、`<cite>`、`<img>`、HTML/Markdown 标签、其他展开占位或无证据推测
  reasoning:
    - 说明导致哪个测试输入、预期结果、边界条件、数据校验或上线判断做不了
    - 不替 PRD 作者改写方案

cross_rule_checks:
  purpose: 定义所有内容规则都必须扫描的高风险兜底项，不直接生成 finding，命中后仍需归入最合适的 content-* 规则
  must_review:
    - 异常流程、失败分支、撤回、重试、超时、空值、并发
    - 文件上传、导入、批量提交类场景必须检查格式错误、空文件、重复数据、解析失败、部分成功、提交失败和失败后是否可重试
    - 状态流转是否闭环，是否能推导出可验证预期
    - 是否存在“只写目标，不写现状 / 只写结果，不写规则 / 只写页面，不写数据”
    - 是否每个核心功能点都能拆出测试条件、输入和预期结果

rules:
  - id: content-001
    name: 描述悬而未决
    check: 判断当前有效正文是否存在会阻断实现或测试的未决内容
    risk_focus: 关键规则、流程、口径或交付范围未收敛
    assessment_points:
      - 未决对象
      - 决策责任和时间
      - 对实现、测试或验收的影响
      - 是否明确非本期
    signals:
      weak_signals: [待定, 待讨论, 后续讨论, 有异议, 不确定, 待确定, 待评估]
      positive_signals: [最终方案, 明确结论, 已确认]
    judge_as:
      high: 核心流程、规则、口径或交付范围仍待定
      medium: 非核心未决点已影响完整理解
      low: 局部备注未收敛但不影响主线
    severity_guidance:
      high: 未决点会阻断实现或测试断言
      medium: 主流程可做，但未决点会造成明显分歧或漏测
      low: 未决内容属于局部表达或后续协作信息
    evidence_guidance:
      - 引用未决表述
      - 分期、本期不做、后续版本类边界问题转交 content-009

  - id: content-002
    name: 引用式描述过多，信息未自洽
    check: 判断当前正文是否过度依赖外部引用，无法独立形成基本理解
    risk_focus: 关键规则依赖跳转外部材料才能复原
    assessment_points:
      - 引用对象
      - 当前正文是否有关键规则摘要
      - 引用是否可定位
      - 本期差异和复用边界
    signals:
      weak_signals: [同上, 类似, 参考, 如XX一样, 和XX一致, 同线上, 保持现状, 与线上相同]
      positive_signals: [链接, http, 文档, 详见, 背景说明, 现状描述]
    judge_as:
      high: 核心规则完全依赖外部引用，主流程无法实现或测试
      medium: 多处依赖引用，当前正文不能独立承载关键上下文
      low: 少量引用存在，但主体信息自洽
    severity_guidance:
      high: 引用承载核心规则且正文无可执行摘要
      medium: 当前文档不能独立复原关键上下文，评审需跳转补证据
      low: 引用只是补充材料，主体方案仍可理解
    evidence_guidance:
      - 引用“参考 / 同上 / 与线上一致”等表述
      - 当前状态与目标状态差异不可判断时，转交 content-005
      - 外链不可读或无权限只进 non_blocking_notes

  - id: content-003
    name: 核心交互或业务流程不闭环
    check: 判断核心流程是否覆盖触发、输入、处理、结果和异常路径
    risk_focus: 主链路或异常链路无法形成测试闭环
    assessment_points:
      - 触发入口
      - 输入条件
      - 处理过程
      - 成功、失败、空态、回退或提示
      - 上传、导入、批量提交类场景的格式校验、解析结果、部分失败、重复数据或重试处理
      - 超时、不可用、无权限、无数据、并发或重复操作
    signals:
      trigger_context: [点击, 进入, 打开, 跳转, 触发, 操作, 按钮, 提交, 发起, 输入, 上传, 导入, 批量, 文件]
      positive_signals: [触发, 输入, 请求, 响应, 展示, 返回, 结果, 跳转, 失败, 异常, 提示, 解析, 重试, 校验, excel, csv]
    judge_as:
      high: 核心流程缺少触发、判断或结果
      medium: 主链路存在，但异常、失败、空态或回退不清
      low: 局部步骤略粗但不影响主体流程
    severity_guidance:
      high: 缺少触发、判断或结果之一，主链路测试无法闭环
      medium: 主链路可测，但失败、空态、回退或边界场景不清
      low: 仅局部动作描述偏粗，不影响核心断言
    evidence_guidance:
      - 引用流程、触发、结果或异常相关正文
      - 文件上传、导入、批量提交场景缺少格式错误、解析失败、重复数据、部分成功或提交失败规则时，优先保留在本规则
      - 字段来源、枚举、默认值或空值兜底问题转交 content-004

  - id: content-004
    name: 业务字段 / 数据口径定义不足
    check: 判断业务字段、业务来源 / 口径来源、配置项或展示数据是否有可测口径
    risk_focus: 字段业务含义、业务来源 / 口径来源或取数规则缺失，导致断言不一致
    assessment_points:
      - 字段业务来源 / 口径来源
      - 字段含义、枚举、默认值或示例
      - 生效范围（按天、按场次、按用户、按对象）
      - 取数优先级、排序、筛选、冲突裁决或空值兜底
      - 业务计算顺序、封顶/取整/裁剪先后关系
      - 展示、配置判断、业务计算或保存诉求
      - 历史记录或既有展示兼容诉求
    signals:
      trigger_context: [字段, 参数, 数据, 配置, 取数, 保存, 展示, 价格, 金额, 标签, 状态]
      positive_signals: [字段名, 字段含义, 字段列表, 示例值, 枚举, 默认值, 取数规则, 展示规则]
    judge_as:
      high: 核心字段业务来源、含义或取数规则缺失
      medium: 字段存在，但约束、枚举、默认值或边界不清
      low: 主体口径明确，仅局部示例或辅助说明不足
    severity_guidance:
      high: 关键字段的业务来源、含义、作用范围或计算顺序缺失，研发和 QA 无法形成一致断言
      medium: 字段主体存在，但业务约束、边界、默认值或兼容诉求不足
      low: 仅缺少示例、局部枚举或辅助字段说明，不影响主链路判断
    evidence_guidance:
      - 引用字段、取数、配置、展示或保存相关正文
      - 同一业务计算对象若同时缺少参数值、生效范围和计算顺序，合并输出为一条完整阻断链，不拆成多个碎问题
      - 这里的“来源”指业务来源 / 口径来源；库表、接口协议、幂等、表结构、缓存、索引等研发实现或设计细节不作为 PRD 内容缺陷
      - 对接责任或依赖兜底问题转交 content-006
      - 流程成功、失败、空态或回退问题转交 content-003

  - id: content-005
    name: 现状与目标状态断裂
    check: 判断变更型需求是否同时说明当前状态、目标状态和差异范围
    risk_focus: 只说明目标态，无法判断改动幅度、兼容边界或回归范围
    assessment_points:
      - 当前线上行为、历史规则、旧字段、旧流程或旧样式
      - 目标状态
      - 保持不变、变更、下线或兼容范围
      - 回归边界
    signals:
      trigger_context: [保持现状, 与线上相同, 跟线上一样, 沿用现有, 同线上, 改造, 调整, 优化]
      positive_signals: [当前, 现有, 线上, 历史, 之前, 原有, 参见, 详见]
    judge_as:
      medium: 目标态存在，但现状或差异边界不清
      low: 现状有提及，但粒度不足
    severity_guidance:
      high: 缺少现状会导致核心变更无法判断或兼容风险不可控时可上调为 high
      medium: 目标可读但差异边界和回归范围不清
      low: 现状基本可复原，仅少量局部差异需要补充
    evidence_guidance:
      - 引用目标态、现状、同线上或保持现状类正文
      - 外部引用导致正文不自洽时，转交 content-002

  - id: content-006
    name: 上下游对接信息不足
    check: 判断提到对接、依赖或协同时，是否说明对象、责任、契约和联调边界
    risk_focus: 对接信息不足导致实施、联调或测试准备无法启动
    assessment_points:
      - 对接对象
      - 契约入口或联调环境
      - 责任边界
      - 交付或联调时间依赖
      - 依赖失败兜底
    signals:
      trigger_context: [对接, 上下游, 依赖方, 调用方, 被调用, 协同, 合作方]
      positive_signals: [对接人, 对接文档, POC, 负责人, 联系人, 链接, wiki, doc]
    judge_as:
      high: 上下游契约缺失阻断主链路实现或联调
      medium: 对接关系存在，但入口、责任或联调边界不清
      low: 对接对象明确，仅局部支撑信息不足
    severity_guidance:
      high: 上下游契约缺失阻断主链路实现或联调
      medium: 对接关系明确但文档、责任边界或联调入口不足
      low: 主要对象清楚，仅缺少局部负责人或辅助材料
    evidence_guidance:
      - 引用对接、依赖、联调或责任边界相关正文
      - 字段含义、接口参数或取数规则问题转交 content-004
      - 仅缺少依赖或风险结构入口时，转交 structure-005

  - id: content-007
    name: AB 实验描述不清
    check: 判断 C 端 AB、灰度或分流方案是否具备可上线、可测试、可解释的最小信息
    risk_focus: 实验能上线但无法验证或解释结果；B 端默认不套用 C 端实验要求
    assessment_points:
      - B 端 / C 端属性
      - 实验目标或方案差异
      - 分流节点、实验组差异、命中优先级或核心命中条件
      - 端、版本、人群、城市、入口或过滤条件
      - 核心观察指标
    signals:
      trigger_context: [AB实验, ab实验, A/B, 分流, 实验分组, 实验组, 对照组, 灰度]
      positive_signals: [分流比例, 分流节点, 分组逻辑, 实验组逻辑, 对照组逻辑, 指标]
    judge_as:
      not_applicable: B 端需求不承接 C 端分流或实验解释
      high: C 端实验缺少分流节点、实验组差异或核心命中条件
      medium: C 端实验可运行，但命中范围、核心指标或放量节奏不清
      low: 主体实验方案明确，仅辅助信息待补
    severity_guidance:
      high: 仅用于 C 端本期实验核心分流或命中条件缺失，且会阻断上线或测试设计
      medium: C 端实验主链路可测，但指标、放量或特殊人群不足以支撑结果解释
      low: C 端主体实验方案清楚，仅辅助指标、实验链接或局部全量条件待补
    evidence_guidance:
      - 引用实验、灰度、分流、命中或指标相关正文
      - B 端 not_applicable 写入 non_blocking_notes，不输出 finding
      - 产品整体影响范围问题转交 content-008
      - 仅缺实验结构入口时转交 structure-007

  - id: content-008
    name: 变更影响面描述不具体
    check: 判断变更型需求是否说明可测试、可回归的影响面
    risk_focus: 影响面过粗导致回归范围被低估
    assessment_points:
      - 页面、模块、流程、入口、配置或历史能力
      - 接口、字段、缓存、报表或下游消费
      - 角色、人群、端、城市、版本或实验组
      - 旧链路、边界场景和不改范围
    signals:
      trigger_context: [变更, 修改, 调整, 改造, 升级, 重构]
      positive_signals: [影响范围, 影响面, 受影响, 波及, 回归范围, 兼容]
    judge_as:
      high: 影响面缺失导致核心回归范围无法判断
      medium: 变更主体清楚，但主要回归对象不完整
      low: 影响范围有提及，但仍偏粗
    severity_guidance:
      high: 核心回归范围无法判断
      medium: 主体变更清楚，但系统、角色、数据链路或回归边界不完整
      low: 主要影响范围明确，仅辅助模块或边界说明不足
    evidence_guidance:
      - 引用变更、影响面或回归范围相关正文
      - 结构阶段仅缺少影响范围入口时，转交 structure-004
      - AB、灰度实验命中范围问题转交 content-007

  - id: content-009
    name: 分期边界 / 本期范围说明不足
    check: 判断当前有效正文中的分期、本期不做、后续版本边界及同一事实来源下的时间/范围口径是否清楚且一致
    risk_focus: 当前版本交付范围、暂不支持表现、跨期依赖不清，或同源口径冲突导致唯一预期无法成立
    assessment_points:
      - 分期对象
      - 本期做 / 不做 / 沿用范围
      - 同一事实来源中的时间、范围、承接路径或交付边界是否一致
      - 暂不支持表现
      - 跨期依赖
      - 本期验收、回归和后续补测边界
    signals:
      trigger_context: [分期, 分批, 分阶段, 迭代, 本期, 一期, 二期, 当前版本, 后续版本]
      weak_signals: [本期不做, 后续再做, 暂不支持, 后续补齐, 后续迭代, 分批上线, 先做, 后做]
      positive_signals: [本期范围, 不做范围, 分期边界, 交付清单, 后续计划, 暂不支持表现, 兼容方案]
    judge_as:
      high: 核心功能或核心流程被拆期，但当前版本范围和暂不支持表现不清，研发实现或测试设计会被阻断
      medium: 能看出大致分期，但本期/后续边界、跨期依赖或测试范围仍不清
      low: 分期边界基本明确，仅少量后续计划、补测范围或提示文案需要确认
    severity_guidance:
      high: 分期不清直接导致当前版本交付内容、接口兼容或核心场景预期无法判断
      medium: 主体交付可理解，但本期不做项、后续依赖或暂不支持表现会造成漏测和评审追问
      low: 本期范围清楚，只有局部后续事项需要补充记录
    evidence_guidance:
      - 引用当前有效正文中的分期、本期不做、后续版本或暂不支持表述
      - 若当前正文同一事实来源同时出现互相冲突的时间/范围/承接口径，优先同时引用两处冲突证据，并定性为“同源冲突”
      - 删除线内分期内容按 additional_checks 过滤
      - 端、页面、角色或回归影响范围不具体时，转交 content-008

  - id: content-010
    name: 模糊副词和主观表述过多
    check: 判断模糊或主观表述是否替代了核心规则、阈值、时机或范围
    risk_focus: 模糊表达导致实现分歧或测试预期不一致
    assessment_points:
      - 模糊对象
      - 是否已有数值、枚举、条件、判断标准或示例
      - 是否影响实现或测试预期
      - 出现密度
    signals:
      weak_signals: [可能, 大概, 也许, 或许, 适当, 合理, 较佳, 较好, 相对]
      positive_signals: [阈值, 条件, 规则, 数值, 明确标准]
    judge_as:
      low: 局部存在模糊措辞，但已有替代条件或不影响主链路判断
      medium: 模糊表述大面积影响主体规则理解时，可上调严重度
    severity_guidance:
      high: 模糊表述直接影响核心流程或上线条件且无替代口径时可上调为 high
      medium: 多处模糊表述影响主要规则理解
      low: 局部表达不精确，但不影响主链路判断
    evidence_guidance:
      - 只引用真正影响理解的模糊表述
      - 可归入字段、流程、实验、影响面、对接或分期规则时，优先使用具体规则

additional_checks:
  deleted_text_filter:
    signal: "<del>...</del>"
    default_action: 写入 non_blocking_notes，不进 findings，不扣分
    keep_as_finding_only_when:
      - 删除线内外混排导致当前有效方案无法判断
      - 删除线只覆盖局部词语，导致当前有效句子仍不完整或冲突
    output: 正式 finding 的 evidence 必须引用删除线外当前正文

  comment_coverage_policy:
    signal: "[!comment] 评论 N"
    default_action: 先看当前正文；评论引用原文只作历史定位
    covers_when:
      - 回复给出明确规则、字段口径、文案、范围、负责人确认或非本期边界
      - 回复与当前正文不冲突
      - 正文 + 回复能形成可执行、可测试判断
    keep_as_finding_when:
      - 评论无回复或只有过程信息
      - 回复提出新问题但无最终结论
      - 回复与当前正文冲突
      - 回复缺少具体规则，无法形成测试输入或预期
    output:
      - 已覆盖缺口只写 non_blocking_notes
      - 未覆盖缺口按对应 content-* 输出
      - evidence 优先引用当前正文；仅在正文未同步最终规则或存在未裁决冲突时引用评论
      - 评论未闭环但只影响评审准入时转交结构维度

  template_placeholder_filter:
    signals: [人员分工空表, 报表预留空表, 埋点占位, 评审记录空表, 会议纪要空表, 备注空列, 附录TODO]
    default_action: 写入 non_blocking_notes，不进 findings，不扣分
    keep_as_finding_only_when:
      - 空表是本期报表、数据看板、接口字段、可测口径或上线准出的唯一说明区域
